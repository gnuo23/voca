spring:
  application:
    name: voca-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/voca}
    username: ${SPRING_DATASOURCE_USERNAME:voca}
    password: ${SPRING_DATASOURCE_PASSWORD:voca}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  security:
    user:
      name: ${APP_BASIC_AUTH_USERNAME:admin}
      password: ${APP_BASIC_AUTH_PASSWORD:admin}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
