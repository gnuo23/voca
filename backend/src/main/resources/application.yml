spring:
  application:
    name: voca-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/voca}
    username: ${SPRING_DATASOURCE_USERNAME:voca}
    password: ${SPRING_DATASOURCE_PASSWORD:voca}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:1440}
  ai:
    provider: ${APP_AI_PROVIDER:local}
    batch-size: ${APP_AI_BATCH_SIZE:20}
    max-retries: ${APP_AI_MAX_RETRIES:3}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4.1-mini}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-flash-lite-latest}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
