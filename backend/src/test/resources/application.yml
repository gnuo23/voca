spring:
  datasource:
    url: jdbc:h2:mem:voca;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false
app:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret-test-secret
    expiration-minutes: 60
  ai:
    provider: local
    batch-size: 2
    max-retries: 3
