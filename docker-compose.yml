services:
  db:
    image: postgres:16-alpine
    container_name: voca-db
    environment:
      POSTGRES_DB: voca
      POSTGRES_USER: voca
      POSTGRES_PASSWORD: voca
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voca -d voca"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: voca-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/voca
      SPRING_DATASOURCE_USERNAME: voca
      SPRING_DATASOURCE_PASSWORD: voca
      APP_JWT_SECRET: change-me-change-me-change-me-change-me-change-me-change-me
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: voca-frontend
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://backend:8080
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  postgres-data:
